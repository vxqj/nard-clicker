<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Big Nard Clicker — nard.lol</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="glow-a"></div>
  <div class="glow-b"></div>

  <main class="wrap">

    <p class="kicker">NARD.LOL</p>
    <h1 class="title">BIG NARD CLICKER</h1>

    <div class="counter-block">
      <div class="count" id="count">0</div>
      <div class="count-label">CLICKS</div>
    </div>

    <div class="cps-row">
      <span id="cps">0</span> clicks/sec &nbsp;·&nbsp; streak <span id="streak">0</span>
    </div>

    <div class="click-zone">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <button class="face-btn" id="faceBtn" aria-label="Click Mitchell's face">
        <img id="faceImg" src="" alt="Mitchell" draggable="false" />
        <div class="placeholder" id="placeholder">
          <span>👆</span>
          <span>CLICK</span>
        </div>
      </button>
    </div>

    <p class="hint">tap as fast as you want — every click counts live, for everyone</p>

  </main>

  <div id="popLayer" class="pop-layer"></div>
  <div id="milestoneLayer" class="milestone-layer"></div>
  <div id="flash" class="flash"></div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
