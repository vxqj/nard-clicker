<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Big Nard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <span class="case-tag" id="caseTag">CASE NL-0930</span>
      <h1 class="brand" id="siteTitle">BIG NARD</h1>
      <span class="case-tag" id="siteSubtitle">Confirmed Sightings & Field Reports</span>
    </div>
  </header>

  <main class="layout">
    <div id="map"></div>

    <aside class="panel" id="panel">
      <div class="panel-empty" id="panelEmpty">
        <span class="panel-empty-icon">📍</span>
        <p>Tap a marker on the map to pull up its field report.</p>
        <p class="panel-count" id="panelCount"></p>
      </div>

      <div class="panel-report" id="panelReport" hidden>
        <span class="report-tag" id="reportTag">TAG</span>
        <h2 class="report-title" id="reportTitle">Title</h2>
        <div class="report-meta">
          <span id="reportDate"></span>
          <span id="reportLocation"></span>
        </div>
        <div class="report-photo" id="reportPhotoWrap" hidden>
          <img id="reportPhoto" src="" alt="" />
        </div>
        <p class="report-body" id="reportBody"></p>
        <button class="report-close" id="reportClose">← Back to map</button>
      </div>
    </aside>
  </main>

  <footer class="foot">
    <span>nard.lol — sightings logged and verified by absolutely no one official</span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
