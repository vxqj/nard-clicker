<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WANTED — Big Nard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SVG filter used to rough up the poster edges -->
  <svg width="0" height="0" style="position:absolute">
    <filter id="roughEdge" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.06" numOctaves="3" seed="7" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="roughEdgeSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.08" numOctaves="2" seed="3" result="noise2" />
      <feDisplacementMap in="SourceGraphic" in2="noise2" scale="10" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div class="scene" id="scene">
    <div class="wall"></div>
    <div class="dust" id="dustLayer"></div>

    <div class="poster-stage" id="posterStage">
      <div class="poster" id="poster">
        <div class="paper-tex"></div>

        <div class="content">
          <h1 class="wanted">WANTED</h1>
          <p class="crime" id="crimeText">FOR CRIMES</p>

          <div class="photo-frame">
            <img id="photo" src="" alt="Big Nard" draggable="false" />
          </div>

          <h2 class="name" id="nameText">BIG NARD</h2>
          <p class="reward" id="rewardText">$15,000 REWARD</p>
          <p class="caution" id="cautionText">approach with caution</p>
        </div>

        <div class="nail nail-tl"></div>
        <div class="nail nail-tr"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
