<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WANTED — Big Nard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- (torn edge is now generated as a clip-path in script.js — more reliable than SVG filters) -->

  <div class="scene" id="scene">
    <div class="wall"></div>
    <div class="dust" id="dustLayer"></div>

    <div class="poster-stage" id="posterStage">
      <div class="poster" id="poster">
        <div class="paper-shape">
          <div class="paper-tex"></div>
        </div>

        <div class="content">
          <h1 class="wanted">WANTED</h1>
          <p class="crime" id="crimeText">FOR CRIMES</p>

          <div class="photo-frame">
            <img id="photo" src="" alt="Big Nard" draggable="false" />
          </div>

          <h2 class="name" id="nameText">BIG NARD</h2>
          <p class="reward" id="rewardText">$15,000 REWARD</p>
          <p class="caution" id="cautionText">approach with caution</p>
        </div>

        <div class="nail nail-tl"></div>
        <div class="nail nail-tr"></div>
      </div>
    </div>
  </div>

  <canvas id="burnCanvas"></canvas>
  <canvas id="emberCanvas"></canvas>

  <div id="lighterCursor" class="lighter-cursor">
    <svg class="lighter-flame" viewBox="0 0 40 60" width="40" height="60">
      <path class="flame-outer" d="M20 2c5 8 9 13 9 21a9 9 0 1 1-18 0c0-3 1-5 2.5-7 .3 3 2 4 2 4-1-5 1-9 4.5-13 0 4 1 6 3 8 1 1 2 3.5 2 6.5"/>
      <path class="flame-inner" d="M20 16c2.5 4 4.5 7 4.5 11a4.5 4.5 0 1 1-9 0c0-2.5 1.5-4.5 3-6 0 1.5.5 2.5 1.5 3-1-3.5.5-5.5 0-8z"/>
    </svg>
    <svg class="lighter-body" viewBox="0 0 40 60" width="40" height="60">
      <rect x="14" y="20" width="12" height="6" rx="1.5" fill="#8a8f94" stroke="#3a3d40" stroke-width="1"/>
      <circle cx="20" cy="23" r="2.1" fill="#c9cdd1" stroke="#3a3d40" stroke-width="0.8"/>
      <rect x="10" y="25" width="20" height="30" rx="4" fill="url(#lighterGrad)" stroke="#5b1a12" stroke-width="1.2"/>
      <rect x="13" y="30" width="14" height="18" rx="2" fill="#000" opacity="0.12"/>
      <defs>
        <linearGradient id="lighterGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#e8503a"/>
          <stop offset="100%" stop-color="#a8291a"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
